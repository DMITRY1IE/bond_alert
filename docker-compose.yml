services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: bond_user
      POSTGRES_PASSWORD: bond_pass
      POSTGRES_DB: bond_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bond_user -d bond_bot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  bot:
    build: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgres://bond_user:bond_pass@postgres:5432/bond_bot?sslmode=disable
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?Create_.env_and_set_TELEGRAM_BOT_TOKEN}
      TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS:-}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_HTTP_TIMEOUT_SEC: ${TELEGRAM_HTTP_TIMEOUT_SEC:-60}
      TELEGRAM_GET_UPDATES_TIMEOUT: ${TELEGRAM_GET_UPDATES_TIMEOUT:-60}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-meta-llama/llama-3.2-3b-instruct:free}
      PARSING_INTERVAL_MINUTES: ${PARSING_INTERVAL_MINUTES:-30}
      USER_AGENT: ${USER_AGENT:-BondSentimentBot/1.0}
      RSS_FEED_URLS: ${RSS_FEED_URLS:-https://www.cbr.ru/rss/eventrss}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LISTEN_ADDR: ${LISTEN_ADDR:-:8000}
      PGHOST: postgres
      PGUSER: bond_user
      PGPASSWORD: bond_pass
      PGDATABASE: bond_bot
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres_data:
